<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YouTube Summary with Gemini — Options</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main>
    <h1>Summary prompt</h1>
    <p class="hint">
      This is the instruction Gemini gets when you click the toolbar button.
      The video’s <strong>title and link are added automatically</strong> — you
      don’t need to include them.
    </p>
    <textarea id="prompt" spellcheck="false" aria-label="Summary prompt"></textarea>
    <div class="actions">
      <button id="save" type="button">Save</button>
      <button id="reset" type="button" class="secondary">Reset to default</button>
      <span id="status" role="status" aria-live="polite"></span>
    </div>
    <footer class="about">
      <span class="about-name">YouTube Summary with Gemini</span>
      <span>© Yi Li 2026–present</span>
      <a href="https://yili.dev/projects/youtube_summary_with_gemini/" target="_blank" rel="noopener">Learn more</a>
    </footer>
  </main>
  <script type="module" src="options.js"></script>
</body>
</html>
